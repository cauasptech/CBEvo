<!doctype html>
<html lang="pt-br">
  <head>
    <link
      rel="shortcut icon"
      href="../assets/icon/icone.ico"
      type="image/x-icon"
    />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CB | Avisos</title>

    <link rel="stylesheet" href="./../css/dashboards.css" />
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body
    onload="(validarSessao(), atualizarFeed())"
    style="background-color: #161618"
  >
    <div class="janela">
      <div class="header-left">
        <h1>CHUTE BOXE ★</h1>

        <div class="hello">
          <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
        </div>

        <div class="btn-nav-white">
          <a href="cards.html">
            <h3>Geral</h3>
          </a>
        </div>

        <div class="btn-nav-white">
          <a href="./dashboard.html">
            <h3>Acompanhamento</h3>
          </a>
        </div>

        <div class="btn-nav">
          <h3>Mural de Treinos</h3>
        </div>

        <div class="btn-logout" onclick="limparSessao()">
          <h3>Sair</h3>
        </div>
      </div>

      <div class="dash-right">
        <div class="avisos">
          <div id="alerta"></div>
          <div class="container">
            <h1>Publicar um aviso</h1>
            <div class="div-form">
              <form
                id="form_postagem"
                method="post"
                onsubmit="return publicar();"
              >
                <label>
                  Título:
                  <br />
                  <input
                    name="titulo"
                    id="titulo"
                    maxlength="100"
                    type="text"
                  />
                </label>
                <br />
                <br />
                <label>
                  Descrição (máximo de 250 caracteres):
                  <br />
                  <textarea
                    name="descricao"
                    id="textarea_descricao"
                    maxlength="250"
                    rows="5"
                  ></textarea>
                </label>
                <br />
                <br />
                <button>Enviar</button>
              </form>
            </div>
            <h1>Mural de Treinos</h1>
            <div class="div-results">
              <div id="feed_container" class="feed-container"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script>
  b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

  function limparFormulario() {
    document.getElementById("form_postagem").reset();
  }

  function publicar() {
    var idUsuario = sessionStorage.ID_USUARIO;

    var corpo = {
      esporteServer: form_postagem.esporte.value,
      descricaoServer: form_postagem.descricao.value,
    };

    fetch(`/avisos/publicar/${idUsuario}`, {
      method: "post",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(corpo),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          window.alert(
            "Treino realizado com sucesso pelo usuario de ID: " +
              idUsuario +
              "!",
          );
          window.location = "/dashboard/mural.html";
          limparFormulario();
          finalizarAguardar();
        } else if (resposta.status == 404) {
          window.alert("Deu 404!");
        } else {
          throw (
            "Houve um erro ao tentar realizar a postagem! Código da resposta: " +
            resposta.status
          );
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function atualizarFeed() {
    fetch("/post/listar")
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(function (resposta) {
            console.log("Dados recebidos: ", JSON.stringify(resposta));

            var feed = document.getElementById("feed_container");
            feed.innerHTML = "";

            for (let i = 0; i < resposta.length; i++) {
              var publicacao = resposta[i];

              var divPublicacao = document.createElement("div");
              var spanNome = document.createElement("span");
              var spanEsporte = document.createElement("span");
              var spanData = document.createElement("span");
              var divDescricao = document.createElement("div");

              spanNome.innerHTML = "Atleta: <b>" + publicacao.nome + "</b>";
              spanEsporte.innerHTML =
                "Esporte: <b>" + publicacao.esporte + "</b>";
              spanData.innerHTML =
                "Data: <b>" +
                new Date(publicacao.dtTreino).toLocaleDateString("pt-BR") +
                "</b>";
              divDescricao.innerHTML =
                "Descrição: <b>" + publicacao.descricao + "</b>";

              divPublicacao.className = "publicacao";
              spanNome.className = "publicacao-nome";
              spanEsporte.className = "publicacao-titulo";
              divDescricao.className = "publicacao-descricao";

              divPublicacao.appendChild(spanNome);
              divPublicacao.appendChild(spanEsporte);
              divPublicacao.appendChild(spanData);
              divPublicacao.appendChild(divDescricao);
              feed.appendChild(divPublicacao);
            }

            finalizarAguardar();
          });
        } else {
          throw "Houve um erro na API!";
        }
      })
      .catch(function (resposta) {
        console.error(resposta);
        finalizarAguardar();
      });
  }
</script>
