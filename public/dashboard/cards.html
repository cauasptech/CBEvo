<!doctype html>
<html lang="pt-br">
  <head>
    <link
      rel="shortcut icon"
      href="../assets/icon/icone.ico"
      type="image/x-icon"
    />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CB | Tempo Real</title>

    <link rel="stylesheet" href="./../css/dashboards.css" />
    <link rel="stylesheet" href="./../css/estilo.css" />

    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body onload="(validarSessao(), listarAcademias())">
    <div class="janela">
      <div class="header-left dash-header">
        <h1>CHUTE BOXE ★</h1>

        <div class="hello">
          <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
        </div>

        <div class="btn-nav">
          <h3>Geral</h3>
        </div>

        <div class="btn-nav-white">
          <a href="./dashboard.html">
            <h3>Acompanhamento</h3>
          </a>
        </div>

        <div class="btn-nav-white">
          <a href="./mural.html">
            <h3>Mural de Treinos</h3>
          </a>
        </div>

        <div class="btn-logout" onclick="limparSessao()">
          <h3>Sair</h3>
        </div>
      </div>

      <div class="dash">
        <div class="cards" id="cardAcademias"></div>
      </div>
    </div>
  </body>

  <script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    function listarAcademias() {
      fetch("/academia/listar")
        .then(function (resposta) {
          if (resposta.ok) {
            resposta.json().then(function (academias) {
              academias.forEach(function (academia) {
                document.getElementById("cardAcademias").innerHTML += `
                        <div class="card-aquario">
                        <div class="title-aquario">
                        <h1>${academia.nome}</h1>
                        </div>
                        <div class="desc-aquario">
                        <p>CEP: ${academia.fk_CEP}</p>
                        </div>
                        </div>`;
              });
            });
          }
        })
        .catch(function (erro) {
          console.log(`#ERRO: ${erro}`);
        });
    }
  </script>
</html>
