<!doctype html>
<html lang="pt-br">
  <head>
    <link
      rel="shortcut icon"
      href="../assets/icon/icone.ico"
      type="image/x-icon"
    />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CB | Dashboards</title>

    <link rel="stylesheet" href="./../css/dashboards.css" />
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--FONT AWESOME-->
    <script
      src="https://kit.fontawesome.com/9f7414eb10.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <!-- <body onload=" atualizarFeed()"> -->

  <body onload="(validarSessao(), carregarGraficos())">
    <div class="janela">
      <div class="header-left">
        <h1>CB EVO ★</h1>

        <div class="hello">
          <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
        </div>

        <div class="btn-nav">
          <h3>Geral</h3>
        </div>
        
        <div class="btn-nav-white">
          <a href="./dashboard.html">
            <h3>Acompanhamento</h3>
          </a>
        </div>

        <div class="btn-nav-white">
          <a href="./mural.html">
            <h3>Mural de Treinos</h3>
          </a>
        </div>

        <div class="btn-logout" onclick="limparSessao()">
          <h3>Sair</h3>
        </div>
      </div>

      <div class="dash">
        <div id="graficos">
          <div>
            <h3 class="tituloGraficos">Posts por Esporte</h3>
            <div style="width: 300px; height: 300px;" class="graph">
              <canvas id="chartEsporte"></canvas>
            </div>
          </div>
          <div>
              <h3 class="tituloGraficos">Usuários por Gênero</h3>
              <div style="width: 300px; height: 300px;" class="graph">
                <canvas id="chartGenero"></canvas>
            </div>
          </div>
          <div id="kpis">
            <div class="kpi">
              <h3 class="titulo">Atleta com mais posts:</h3>
              <p id="kpi_atleta"></p>
            </div>
            <div class="kpi">
              <h3 class="titulo">Academia com mais atletas:</h3>
              <p id="kpi_academia"></p>
            </div>
            <div class="kpi">
              <h3 class="titulo">Total de academias:</h3>
              <p id="kpi_total"></p>
            </div>
            </div>
            <div id="grafico_academia">
              <h3 class="titulo" style="color: white;">Posts por Academia</h3>
              <div style="width: 700px; height: 400px;" class="graph">
                <canvas id="chartPostAcad"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script>
  b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

  function carregarGraficos() {
    plotarEsporte();
    plotarGenero();
    plotarAtletaMaisPosts();
    plotarAcademiaMaisAtletas();
    plotarTotalAcademias();
    plotarAcademiaMaisPosts();
  }

  function plotarEsporte() {
    fetch("/post/qtd_esporte")
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(function (resultado) {
            console.log(`Dados recebidos: ${JSON.stringify(resultado)}`);

            var labels = [];
            var totais = [];

            for (var i = 0; i < resultado.length; i++) {
              labels.push(resultado[i].esporte);
              totais.push(resultado[i].total);
            }

            var dados = {
              labels: labels,
              datasets: [
                {
                  label: "Quantidade de Posts",
                  data: totais,
                  backgroundColor: [
                    "rgb(245, 0, 0)",
                    "rgb(75, 192, 252)",
                    "rgb(255, 255, 255)",
                  ],
                },
              ],
            };

            var config = {
              type: "doughnut",
              data: dados,
              options: {
              color: "white"}
            };

            new Chart(document.getElementById("chartEsporte"), config);
          });
        } else {
          console.error("Nenhum dado encontrado ou erro na API");
        }
      })
      .catch(function (erro) {
        console.error(
          `Houve um erro na obtenção dos dados p/ gráfico: ${erro.message}`,
        );
      });
  }

  function plotarGenero() {
    fetch("/post/qtd_genero")
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(function (resultado) {
            console.log(`Dados recebidos: ${JSON.stringify(resultado)}`);

            var labels = [];
            var totais = [];

            for (var i = 0; i < resultado.length; i++) {
              if (resultado[i].genero == "M") labels.push("Masculino");
              else if (resultado[i].genero == "F") labels.push("Feminino");
              else labels.push("Outro");
              totais.push(resultado[i].total);
            }

            var dados = {
              labels: labels,
              datasets: [
                {
                  label: "Usuários por Gênero",
                  data: totais,
                  backgroundColor: [
                    "rgb(0, 0, 225)",
                    "rgb(245, 0, 0)",
                    "rgb(225 , 0, 200)",
                  ],
                },
              ],
            };

            var config = {
              type: "doughnut",
              data: dados,
              options: {
              color: "#ffff"}
            };

            new Chart(document.getElementById("chartGenero"), config);
          });
        } else {
          console.error("Nenhum dado encontrado ou erro na API");
        }
      })
      .catch(function (erro) {
        console.error(
          `Houve um erro na obtenção dos dados p/ gráfico: ${erro.message}`,
        );
      });
  }

  function plotarAtletaMaisPosts() {
    fetch("/post/qtd_post_atleta")
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(function (resultado) {
          console.log(`Dados recebidos: ${JSON.stringify(resultado)}`);

          var nomes = [];
          for (var i = 0; i < resultado.length; i++) {
          nomes.push(resultado[i].nome + " (" + resultado[i].total + " posts)");
        }

          document.getElementById("kpi_atleta").innerHTML = nomes.join(", ");
        });
        } else {
          console.error("Nenhum dado encontrado ou erro na API");
      }
        })
          .catch(function (erro) {
            console.error(`Houve um erro na obtenção dos dados: ${erro.message}`);
        });
    }

    function plotarAcademiaMaisAtletas() {
      fetch("/post/qtd_atleta_academia")
        .then(function (resposta) {
          if (resposta.ok) {
            resposta.json().then(function (resultado) {
              console.log(`Dados recebidos: ${JSON.stringify(resultado)}`);

              var academias = [];
              for (var i = 0; i < resultado.length; i++) {
              academias.push(resultado[i].academia + " (" + resultado[i].total + " atletas)");
            }

              document.getElementById("kpi_academia").innerHTML = academias.join(", ");
            });
            } else {
              console.error("Nenhum dado encontrado ou erro na API");
          }
            })
            .catch(function (erro) {
              console.error(`Houve um erro na obtenção dos dados: ${erro.message}`);
            });
    }

    function plotarTotalAcademias() {
      fetch("/post/qtd_academia")
        .then(function (resposta) {
          if (resposta.ok) {
            resposta.json().then(function (resultado) {
              console.log(`Dados recebidos: ${JSON.stringify(resultado)}`);
              document.getElementById("kpi_total").innerHTML = resultado[0].total;
          });
          } else {
            console.error("Nenhum dado encontrado ou erro na API");
        }
          })
            .catch(function (erro) {
              console.error(`Houve um erro na obtenção dos dados: ${erro.message}`);
          });
    }

    function plotarAcademiaMaisPosts() {
    fetch("/post/qtd_post_academia")
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(function (resultado) {
            console.log(`Dados recebidos: ${JSON.stringify(resultado)}`);

            var labels = [];
            var totais = [];

            for (var i = 0; i < resultado.length; i++) {
              labels.push(resultado[i].academia);
              totais.push(resultado[i].total);
            }

            var dados = {
              labels: labels,
              datasets: [
                {
                  label: "Posts por Academia",
                  data: totais,
                  backgroundColor: [
                    "rgb(245 , 0, 10)",
                    "rgb(5 , 255, 0)",
                    "rgb(75 , 195, 252)",
                    "rgb(255 , 255, 255)",
                  ],
                },
              ],
            };

            var config = {
              type: "bar",
              data: dados,
              options: {
                color: "white",
                scales: {
                  x: {
                    ticks: {
                      color: "white"
                    }
                  },
                  y: {
                    ticks: {
                      color: "white",
                      stepSize: 1
                    },
                    grid: {
                      color: "red"
                    }
                  }
                }}
            };

            new Chart(document.getElementById("chartPostAcad"), config);
          });
        } else {
          console.error("Nenhum dado encontrado ou erro na API");
        }
      })
      .catch(function (erro) {
        console.error(
          `Houve um erro na obtenção dos dados p/ gráfico: ${erro.message}`,
        );
      });
  }
</script>
